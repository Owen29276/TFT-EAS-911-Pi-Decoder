# EAS Alert Logger Configuration
# Copy this file to config.ini and modify values as needed
# The logger will look for config.ini in the same directory as TFT_EAS_911_Pi_logger.py

[serial]
# Serial port for the EAS decoder hardware
port = /dev/ttyUSB0

# Baud rate for serial communication (1200 is standard for EAS)
baud = 1200

[logging]
# Directory where application logs will be stored
# Logs rotate at 10MB with 5 backups kept
log_dir = logs

# Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level = INFO

[alerts]
# Directory where alert records will be stored
alerts_dir = alerts

# Time window for alert deduplication (seconds)
# Duplicate alerts within this window will be ignored
dedupe_window = 120

[notifications]
# ntfy.sh topic name for mobile notifications
# Leave empty to disable mobile notifications
# Example: my_eas_alerts  (just the topic, not the full URL)
ntfy_topic =

[hardware]
# Serial decoder filler byte (hex value)
# TFT911 often pads with 0xAB, but can vary
filler_byte = 0xAB

[web]
# Web dashboard listen address and port
host = 0.0.0.0
port = 5000

[control]
# COM3 / J303 serial port for remote control (leave blank to disable)
# Pi example: /dev/ttyUSB1   Windows example: COM3
port =
baud = 9600
# Access PIN configured in menu 19 on the TFT unit
pin =

[advanced]
# Maximum buffer size before trimming (characters)
max_buffer_size = 200000

# Buffer trim size when max is reached
buffer_trim_size = 100000

# Serial port read timeout (seconds)
serial_timeout = 1

# Retry delay when serial port disconnects (seconds)
serial_retry_delay = 1

# Mobile notification timeout (seconds)
notification_timeout = 5
