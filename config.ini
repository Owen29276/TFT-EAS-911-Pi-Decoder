# EAS Alert Logger Configuration

[serial]
port = /dev/tft911-data
baud = 1200

[logging]
log_dir = logs
log_level = INFO

[alerts]
alerts_dir = alerts
dedupe_window = 120

[notifications]
ntfy_topic =

[hardware]
filler_byte = 0xAB

[web]
host = 0.0.0.0
port = 5000

[control]
port = /dev/tft911-cmd
baud = 9600
pin = 915

[advanced]
max_buffer_size = 200000
buffer_trim_size = 100000
serial_timeout = 1
serial_retry_delay = 1
notification_timeout = 5
